<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistem Penilaian 360° AKHLAK</title>
  <link rel="stylesheet" href="css/hifi.css">
</head>
<body>

  <div class="login-layout">
    <!-- Left Side -->
    <div class="login-left">
      <div class="login-brand">
        Sistem Penilaian 360°<br>Core Values AKHLAK
      </div>
      <div class="login-tagline">
        Platform Digital Evaluasi Perilaku Karyawan<br>PT Energi Nusantara
      </div>
      <div style="margin-top: 40px; z-index: 1;">
        <svg width="240" height="240" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path fill="rgba(255,255,255,0.2)" d="M42.7,-70.7C55.9,-61.7,67.6,-50.2,75.4,-36.5C83.2,-22.8,87.1,-6.9,84.4,8.1C81.7,23.1,72.4,37.2,60.8,48.6C49.2,60,35.3,68.7,20.1,73.6C4.9,78.5,-11.6,79.5,-26.6,74.7C-41.6,69.9,-55.1,59.3,-64.5,46.1C-73.9,32.9,-79.2,16.5,-79.8,-0.4C-80.4,-17.3,-76.3,-34.6,-66.5,-47.9C-56.7,-61.2,-41.2,-70.5,-26.5,-75.4C-11.8,-80.3,29.5,-79.7,42.7,-70.7Z" transform="translate(100 100)" />
        </svg>
      </div>
    </div>

    <!-- Right Side -->
    <div class="login-right">
      <div class="login-card">
        <div class="login-logo">360°</div>

        <div class="login-title">Selamat Datang</div>
        <div class="login-subtitle">Masuk ke akun Anda untuk melanjutkan</div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="form-input-icon">
            <span class="input-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
            <input type="text" class="form-input" placeholder="Masukkan username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-icon">
            <span class="input-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span>
            <input type="password" class="form-input" placeholder="Masukkan password">
          </div>
        </div>

        <div class="login-options">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-muted);">
            <input type="checkbox" style="width:16px; height:16px; accent-color:var(--primary);"> Ingat Saya
          </label>
          <a href="#" style="font-weight:500;">Lupa Password?</a>
        </div>

        <button class="btn btn-primary" style="width:100%; padding:12px; font-size:15px; margin-bottom:16px;" onclick="showRoleSelect()">Masuk</button>

        <!-- Role Selection (appears after clicking Masuk) -->
        <div id="roleSelect" style="display:none; margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; background:#FAFAFA;">
          <div style="font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 12px; text-align: center; text-transform:uppercase; letter-spacing:0.5px;">Pilih Role Prototype</div>
          <a href="admin-hr/dashboard.html" class="btn btn-outline" style="width:100%; margin-bottom:8px; justify-content:center;">Admin HR</a>
          <a href="atasan/dashboard.html" class="btn btn-outline" style="width:100%; margin-bottom:8px; justify-content:center;">Atasan</a>
          <a href="karyawan/dashboard.html" class="btn btn-outline" style="width:100%; margin-bottom:8px; justify-content:center;">Karyawan</a>
          <a href="manajemen/dashboard.html" class="btn btn-outline" style="width:100%; justify-content:center;">Manajemen</a>
        </div>

        <div class="login-footer">© 2026 PT Energi Nusantara. All rights reserved.</div>
      </div>
    </div>
  </div>

  <script>
    function showRoleSelect() {
      document.getElementById('roleSelect').style.display = 'block';
    }
  </script>
</body>
</html>
