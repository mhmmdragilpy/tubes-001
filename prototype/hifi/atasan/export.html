<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Laporan — Atasan</title>
  <link rel="stylesheet" href="../css/hifi.css">
</head>
<body data-role="atasan" data-page="export">
  <div class="app-layout">
    <div id="sidebar"></div>
    <div class="main-wrapper">
      <div id="topbar"></div>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">Export Laporan Penilaian Tim</h1></div>

        <div class="grid-60-40">
          <div class="card">
            <div class="card-title mb-16">Konfigurasi Laporan</div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Periode Penilaian</label>
                <select class="form-select"><option>Semester 1 — 2026</option><option>Semester 2 — 2025</option></select>
              </div>
              <div class="form-group">
                <label class="form-label">Format Output</label>
                <select class="form-select"><option>PDF Document (.pdf)</option><option>Excel Spreadsheet (.xlsx)</option></select>
              </div>
              <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Cakupan Data</label>
                <select class="form-select"><option>Seluruh Bawahan Langsung (Summary Tim)</option><option>Per Individu (Detail Laporan per Karyawan)</option></select>
              </div>
            </div>
            
            <div style="margin-top:16px; padding:16px; background:var(--bg-main); border-radius:var(--radius-md); border:1px solid var(--border);">
              <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;">
                <input type="checkbox" checked style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px; font-weight:500;">Sertakan Grafik Analitik (Radar Chart & Bar Chart)</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;">
                <input type="checkbox" checked style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px; font-weight:500;">Sertakan Gap Analysis (Self vs Others)</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px; font-weight:500;">Sertakan Komentar Kualitatif (Anonim)</span>
              </label>
            </div>

            <button class="btn btn-primary mt-24" style="width:100%; justify-content:center; padding:14px; font-size:16px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Generate Laporan
            </button>
          </div>

          <div class="card" style="background:var(--bg-main); border:1px dashed var(--border-focus); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center;">
            <div style="width:80px; height:80px; background:rgba(46,134,171,0.1); color:var(--secondary); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <div style="font-size:18px; font-weight:700; color:var(--primary); margin-bottom:8px;">Preview Laporan</div>
            <div style="font-size:14px; color:var(--text-muted); margin-bottom:24px; max-width:250px;">Atur konfigurasi di sebelah kiri dan klik "Generate Laporan" untuk melihat preview.</div>
            <button class="btn btn-outline" disabled style="opacity:0.5; cursor:not-allowed;">Unduh File</button>
          </div>
        </div>

      </main>
    </div>
  </div>
  <script src="../js/components.js"></script>
</body>
</html>
