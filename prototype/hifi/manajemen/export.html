<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Laporan Eksekutif — Manajemen</title>
  <link rel="stylesheet" href="../css/hifi.css">
</head>
<body data-role="manajemen" data-page="export">
  <div class="app-layout">
    <div id="sidebar"></div>
    <div class="main-wrapper">
      <div id="topbar"></div>
      <main class="main-content">
        <div class="page-header">
          <h1 class="page-title">Generate Laporan Eksekutif</h1>
          <div class="text-sm text-muted">Hasilkan laporan komprehensif tingkat perusahaan untuk keperluan audit dan evaluasi direksi.</div>
        </div>

        <div class="grid-60-40">
          <div class="card">
            <div class="card-title mb-16">Konfigurasi Laporan</div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Periode</label>
                <select class="form-select"><option>Semester 1 — 2026</option><option>Semester 2 — 2025</option></select>
              </div>
              <div class="form-group">
                <label class="form-label">Format Output</label>
                <select class="form-select"><option>Executive Summary (PDF)</option><option>Raw Data (Excel)</option><option>Presentation Deck (PPTX)</option></select>
              </div>
              <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Filter Divisi</label>
                <select class="form-select"><option>Seluruh Perusahaan (Semua Divisi)</option><option>Divisi Spesifik...</option></select>
              </div>
            </div>
            
            <div class="mt-16 mb-24" style="padding:16px; background:var(--bg-main); border-radius:var(--radius-md); border:1px solid var(--border);">
              <div style="font-weight:600; font-size:14px; margin-bottom:12px; color:var(--text-main);">Pilih Metrik untuk Disertakan:</div>
              <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;">
                <input type="checkbox" checked style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px;">Ringkasan KPI Partisipasi</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;">
                <input type="checkbox" checked style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px;">Distribusi Skor per Divisi & Demografi</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;">
                <input type="checkbox" checked style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px;">Daftar Top 10 & Bottom 10 Performers</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" style="width:16px; height:16px; accent-color:var(--primary);">
                <span style="font-size:14px;">Feedback Kualitatif (Di-summarize oleh AI)</span>
              </label>
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center; padding:14px; font-size:16px; background:linear-gradient(135deg, var(--primary), var(--secondary)); border:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Generate Laporan Eksekutif
            </button>
          </div>

          <div class="card text-center" style="display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg, var(--bg-main), #FFF); border:1px dashed var(--border-focus);">
            <div style="width:80px; height:80px; background:rgba(46,134,171,0.1); color:var(--secondary); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
            </div>
            <div style="font-size:18px; font-weight:700; color:var(--primary); margin-bottom:8px;">Laporan Belum Dibuat</div>
            <div style="font-size:14px; color:var(--text-muted); margin-bottom:24px; max-width:250px;">Atur konfigurasi di sebelah kiri, dan klik "Generate" untuk menghasilkan file PDF/Excel.</div>
            <button class="btn btn-outline" disabled style="opacity:0.5; cursor:not-allowed;">Unduh Laporan</button>
          </div>
        </div>

      </main>
    </div>
  </div>
  <script src="../js/components.js"></script>
</body>
</html>
