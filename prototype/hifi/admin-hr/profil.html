<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — Admin HR</title>
  <link rel="stylesheet" href="../css/hifi.css">
</head>
<body data-role="admin-hr" data-page="profil">
  <div class="app-layout">
    <div id="sidebar"></div>
    <div class="main-wrapper">
      <div id="topbar"></div>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">Pengaturan Profil</h1></div>

        <div class="grid-35-65">
          <!-- Profil Card -->
          <div class="card text-center" style="position:relative; overflow:hidden;">
            <div style="height:100px; background:linear-gradient(135deg, var(--primary), var(--secondary)); position:absolute; top:0; left:0; width:100%; z-index:0;"></div>
            <div class="avatar avatar-xl" style="margin:40px auto 0; position:relative; z-index:1;">AH</div>
            <button class="btn btn-sm btn-outline" style="margin:16px auto 0; position:relative; z-index:1;">Ubah Foto</button>
            <div style="margin-top:16px; font-size:20px; font-weight:700; color:var(--primary);">Admin HR</div>
            <span class="badge badge-primary" style="margin-top:8px;">Administrator</span>
            <div style="margin-top:20px; text-align:left; font-size:13px; color:var(--text-muted); border-top:1px solid var(--border); padding-top:16px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>NIP</span><strong style="color:var(--text-main);">102012330100</strong></div>
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Divisi</span><strong style="color:var(--text-main);">SDM</strong></div>
              <div style="display:flex; justify-content:space-between;"><span>Member sejak</span><strong style="color:var(--text-main);">Mar 2024</strong></div>
            </div>
          </div>

          <!-- Forms -->
          <div>
            <div class="card mb-24">
              <div class="card-title mb-16">Informasi Pribadi</div>
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Nama Lengkap</label>
                  <input type="text" class="form-input" value="Admin HR">
                </div>
                <div class="form-group">
                  <label class="form-label">NIP</label>
                  <input type="text" class="form-input" value="102012330100" disabled style="background:var(--bg-main); cursor:not-allowed;">
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-input" value="admin@energi.co.id">
                </div>
                <div class="form-group">
                  <label class="form-label">No. Telepon</label>
                  <input type="tel" class="form-input" value="081234567890">
                </div>
              </div>
              <button class="btn btn-primary mt-16">Simpan Perubahan</button>
            </div>

            <div class="card">
              <div class="card-title mb-16">Keamanan Akun</div>
              <div class="form-group">
                <label class="form-label">Password Lama</label>
                <input type="password" class="form-input" placeholder="Masukkan password saat ini">
              </div>
              <div class="form-group">
                <label class="form-label">Password Baru</label>
                <input type="password" class="form-input" placeholder="Minimal 8 karakter">
              </div>
              <div class="form-group">
                <label class="form-label">Konfirmasi Password Baru</label>
                <input type="password" class="form-input" placeholder="Ulangi password baru">
              </div>
              <button class="btn btn-primary mt-16">Ubah Password</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../js/components.js"></script>
</body>
</html>
