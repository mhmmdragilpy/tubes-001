<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Laporan — Atasan</title>
  <link rel="stylesheet" href="../css/lofi.css">
</head>
<body data-role="atasan" data-page="export">
  <div class="app-layout">
    <div id="sidebar"></div>
    <div class="main-wrapper">
      <div id="topbar"></div>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">Export Laporan Penilaian</h1></div>
        <div class="card mb-24">
          <div class="card-title mb-16">Konfigurasi Laporan</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group"><label class="form-label">Periode</label><select class="form-select"><option>Semester 1 — 2026</option><option>Semester 2 — 2025</option></select></div>
            <div class="form-group"><label class="form-label">Format</label><select class="form-select"><option>PDF</option><option>Excel</option></select></div>
            <div class="form-group"><label class="form-label">Cakupan</label><select class="form-select"><option>Semua Bawahan</option><option>Per Individu</option></select></div>
          </div>
          <button class="btn btn-dark mt-16">Generate Laporan</button>
        </div>
        <div class="card mb-24">
          <div class="card-title mb-16">Preview Laporan</div>
          <div class="preview-box">
            <div class="preview-title">PREVIEW LAPORAN</div>
            <div>Laporan Penilaian 360° Core Values AKHLAK</div>
            <div>Semester 1 — 2026</div>
            <div style="margin-top:16px; border:1px dashed #D1D5DB; padding:20px; width:80%;">
              <div style="font-size:12px; color:#9CA3AF;">[ Tabel Hasil Penilaian ]</div>
              <div style="margin-top:12px; font-size:12px; color:#9CA3AF;">[ Grafik AKHLAK ]</div>
            </div>
          </div>
        </div>
        <div style="display:flex; gap:12px;">
          <button class="btn btn-dark">📥 Download Laporan</button>
          <button class="btn btn-outline">🖨 Print</button>
        </div>
      </main>
    </div>
  </div>
  <script src="../js/components.js"></script>
</body>
</html>
